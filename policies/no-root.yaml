apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snoroot
  annotations:
    description: Blocks containers running as root (UID 0)
spec:
  crd:
    spec:
      names:
        kind: K8sNoRoot
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snoroot

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          has_root(container)
          msg := sprintf("Container '%v' must not run as root. Set securityContext.runAsNonRoot=true", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          has_root(container)
          msg := sprintf("Init container '%v' must not run as root. Set securityContext.runAsNonRoot=true", [container.name])
        }

        has_root(container) {
          container.securityContext.runAsUser == 0
        }

        has_root(container) {
          not container.securityContext.runAsNonRoot
          not container.securityContext.runAsUser
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sNoRoot
metadata:
  name: no-root-containers
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - argocd
      - falco
